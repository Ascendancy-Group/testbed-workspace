# Advanced Check Types
# ====================
#
# Command Check:
#   - name: Example Command
#     type: command
#     command: echo "test"
#     expect: test          # Optional: check stdout contains string
#     timeout: 10           # Optional: timeout in seconds
#     required: false
#
# HTTP Check:
#   - name: Example HTTP
#     type: http
#     url: https://example.com
#     header:               # Optional headers
#       Authorization: Bearer token
#     expect: success       # Optional: check body contains string
#     timeout: 10
#     required: false
#
# File Size Check:
#   - name: Example File Size
#     type: file_size
#     files:
#       - file1.txt
#       - file2.txt
#     max_total: 10000      # Bytes
#     required: false
#
# JSON Key Check:
#   - name: Example JSON Key
#     type: json_key
#     file: /path/to/file.json
#     key: nested.key.path  # Dotted notation
#     required: false
#
# Git Pull Check:
#   - name: Example Git Pull
#     type: git_pull
#     repo: /path/to/repo
#     required: false
#
# LLM Check (FREE model only):
#   - name: Example LLM
#     type: llm
#     model: meta-llama/llama-3.3-70b-instruct:free
#     prompt: "Question?"
#     expect_contains:
#       - word1
#       - word2
#     required: false

# Notes
# =====
# - All checks run sequentially (not parallel)
# - Total runtime target: < 30 seconds
# - Required checks must pass or agent startup blocked
# - Non-required checks warn but don't block
# - Use FREE model only for LLM checks (zero cost)
# - 1Password refs (op://...) resolved automatically in HTTP headers

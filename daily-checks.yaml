# Daily Checks Configuration for OpenClaw Agents
# ==============================================
#
# This file defines the checks run at session start (once per day).
# Each agent can customize this file for their specific needs.
#
# Location: ~/.openclaw/daily-checks.yaml
# Used by: ~/scripts/daily-checks.py
# Called from: BOOTSTRAP.md at session start
#
# Cost: $0.00/day (all checks use FREE model or bash commands)

# Agent identification
agent:
  # Agent name (testbed, bob, mason, forge)
  name: testbed
  
  # Workspace directory (where SOUL.md, MEMORY.md, etc. live)
  workspace: /home/pieter/.openclaw/workspace

# Daily startup checks
# Each check has:
#   - name: Human-readable name
#   - type: Check type (command, http, file_size, json_key, git_pull, llm)
#   - required: If true, failure blocks agent startup
#   - type-specific parameters (see examples below)
checks:
  # Check 1: 1Password CLI is authenticated
  # Ensures agent can read secrets from 1Password
  - name: 1Password Health
    type: command
    command: op whoami
    required: false
    timeout: 10

  # Check 2: Dropbox write test (direct API via SOP-04 method)
  # Validates end-to-end Dropbox access using 1Password credentials
  # Independent of OpenClaw MCP tool availability
  - name: Dropbox Write Test
    type: dropbox_write_test
    test_file: /(Admin)/Bootstrap/.bootstrap-probe.txt
    test_content: bootstrap-test-{timestamp}
    cleanup: false
    required: false

  # Check 3: GitHub CLI is authenticated
  # Ensures agent can push commits, open PRs, etc.
  - name: GitHub Access
    type: command
    command: gh auth status
    required: false
    timeout: 10

  # Check 4: Pull latest governance repo
  # Syncs SOPs, lessons learned, playbooks
  - name: Governance Sync
    type: git_pull
    repo: /home/pieter/repos/ascendancy-governance
    required: false

  # Check 5: Bootstrap file sizes within limits
  # Verifies context injection control (SOP-15)
  # Limit: 60,000 chars total (15,000 per file)
  - name: Bootstrap Size
    type: file_size
    files:
      - SOUL.md
      - AGENTS.md
      - MEMORY.md
      - USER.md
      - TOOLS.md
      - HEARTBEAT.md
      - IDENTITY.md
      - HANDOFF.md
      - BOOTSTRAP.md
    max_total: 60000
    required: false

  # Check 6: Config has bootstrap limits
  # Ensures openclaw.json has context injection limits
  - name: Config Limits Present
    type: json_key
    file: ~/.openclaw/openclaw.json
    key: agents.defaults.bootstrapMaxChars
    required: false

  # Check 7: OpenClaw gateway is running
  # Validates core infrastructure
  - name: Gateway Health
    type: command
    command: openclaw gateway status
    expect: running
    required: false
    timeout: 10

  # Check 8: Personality self-test (FREE model)
  # Verifies SOUL.md loaded correctly (no vanilla responses)
  # COST: $0.00 (uses FREE model)
  - name: Personality Self-Test
    type: llm
    model: meta-llama/llama-3.3-70b-instruct:free
    prompt: "Who are you? What is your purpose? Answer in 2-3 sentences."
    # Response must contain these terms (case-insensitive)
    expect_contains:
      - testbed
      - infrastructure
      - testing
    required: false

